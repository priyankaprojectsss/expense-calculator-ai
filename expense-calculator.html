<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Calculator with AI Insights</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f4ee;--surface:#fff;--border:#e4e0d8;--accent:#e85d2f;--accent2:#2f6ee8;--text:#1a1a1a;--muted:#888}
    body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem}
    .container{max-width:760px;margin:0 auto}
    header{text-align:center;margin-bottom:2.5rem;animation:fadeUp .5s ease both}
    .badge{display:inline-block;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(232,93,47,.3);padding:.3rem .8rem;border-radius:2rem;margin-bottom:.8rem}
    h1{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;margin-bottom:.5rem}
    .subtitle{color:var(--muted);font-size:.82rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.2rem;animation:fadeUp .5s ease both;box-shadow:0 2px 12px rgba(0,0,0,.04)}
    .label{font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
    .label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block}
    .input-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.8rem}
    input,select{font-family:'DM Mono',monospace;font-size:.8rem;padding:.65rem .9rem;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);outline:none;transition:border-color .2s}
    input:focus,select:focus{border-color:var(--accent)}
    input::placeholder{color:var(--muted)}
    .inp-desc{flex:2;min-width:140px}
    .inp-amt{flex:1;min-width:90px}
    .inp-cat{flex:1;min-width:110px}
    .btn{font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;padding:.65rem 1.4rem;border-radius:8px;border:none;cursor:pointer;transition:all .2s}
    .btn-add{background:var(--accent);color:#fff}
    .btn-add:hover{background:#c94a22;transform:translateY(-1px)}
    .btn-ai{background:var(--accent2);color:#fff;width:100%;margin-top:1rem;font-size:.88rem;padding:.85rem}
    .btn-ai:hover:not(:disabled){background:#1a55cc;transform:translateY(-1px)}
    .btn-ai:disabled{opacity:.5;cursor:not-allowed}
    .btn-del{background:none;border:1px solid var(--border);color:var(--muted);font-size:.7rem;padding:.3rem .6rem;border-radius:6px;cursor:pointer}
    .btn-del:hover{border-color:var(--accent);color:var(--accent)}
    .expense-list{list-style:none}
    .expense-item{display:flex;align-items:center;justify-content:space-between;padding:.7rem .5rem;border-bottom:1px solid var(--border);gap:.5rem}
    .expense-item:last-child{border-bottom:none}
    .exp-left{flex:1}
    .exp-name{font-size:.82rem;font-weight:500}
    .exp-cat{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .exp-amt{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;color:var(--accent);white-space:nowrap}
    .total-row{display:flex;justify-content:space-between;align-items:center;padding:.8rem 0 0;border-top:2px solid var(--border);margin-top:.5rem}
    .total-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
    .total-amt{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem}
    .api-input{width:100%}
    .result-box{display:none}
    .result-box.visible{display:block}
    .result-content{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1.2rem;font-size:.82rem;line-height:1.8;white-space:pre-wrap}
    .loader{display:flex;align-items:center;gap:.5rem;color:var(--muted);font-size:.78rem;padding:.8rem 0}
    .dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent2);animation:bounce 1.2s infinite;margin:0 2px}
    .dots span:nth-child(2){animation-delay:.2s}
    .dots span:nth-child(3){animation-delay:.4s}
    .empty{text-align:center;color:var(--muted);font-size:.78rem;padding:1.5rem 0}
    .error{color:var(--accent);font-size:.78rem;padding:.6rem .9rem;background:rgba(232,93,47,.07);border:1px solid rgba(232,93,47,.2);border-radius:8px;margin-top:.8rem;display:none}
    .footer{text-align:center;color:var(--muted);font-size:.68rem;margin-top:2rem;letter-spacing:.05em}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes bounce{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">✦ Claude AI Powered</div>
    <h1>Expense Calculator</h1>
    <p class="subtitle">Track expenses · Get AI-powered spending insights</p>
  </header>

  <div class="card">
    <div class="label">Add Expense</div>
    <div class="input-row">
      <input class="inp-desc" id="expDesc" type="text" placeholder="Description (e.g. Lunch)"/>
      <input class="inp-amt" id="expAmt" type="number" placeholder="Amount Rs." min="0"/>
      <select class="inp-cat" id="expCat">
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Shopping">Shopping</option>
        <option value="Education">Education</option>
        <option value="Health">Health</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <button class="btn btn-add" onclick="addExpense()">+ Add</button>
  </div>

  <div class="card">
    <div class="label">Expense List</div>
    <ul class="expense-list" id="expenseList">
      <li class="empty">No expenses yet. Add one above!</li>
    </ul>
    <div class="total-row">
      <span class="total-label">Total</span>
      <span class="total-amt" id="totalAmt">Rs. 0</span>
    </div>
  </div>

  <div class="card">
    <div class="label">AI Insights</div>
    <input type="password" class="api-input" id="apiKey" placeholder="Enter Claude API key (sk-ant-...)"/>
    <button class="btn btn-ai" id="aiBtn" onclick="getInsights()">Analyze My Spending</button>
    <div class="error" id="errorBox"></div>
  </div>

  <div class="card result-box" id="resultBox">
    <div class="label">AI Analysis</div>
    <div class="loader" id="loader"><div class="dots"><span></span><span></span><span></span></div>Analyzing...</div>
    <div class="result-content" id="resultContent" style="display:none"></div>
  </div>

  <div class="footer">Built with HTML + JS + Claude API | Project by Priyanka</div>
</div>

<script>
  let expenses = [];

  function addExpense() {
    const desc = document.getElementById('expDesc').value.trim();
    const amt = parseFloat(document.getElementById('expAmt').value);
    const cat = document.getElementById('expCat').value;
    if (!desc || isNaN(amt) || amt <= 0) { alert('Please fill description and valid amount.'); return; }
    expenses.push({ desc, amt, cat, id: Date.now() });
    document.getElementById('expDesc').value = '';
    document.getElementById('expAmt').value = '';
    renderList();
  }

  function deleteExpense(id) {
    expenses = expenses.filter(e => e.id !== id);
    renderList();
  }

  function renderList() {
    const list = document.getElementById('expenseList');
    const total = expenses.reduce((s, e) => s + e.amt, 0);
    document.getElementById('totalAmt').textContent = 'Rs. ' + total.toFixed(2);
    if (expenses.length === 0) {
      list.innerHTML = '<li class="empty">No expenses yet. Add one above!</li>';
      return;
    }
    list.innerHTML = expenses.map(e => `
      <li class="expense-item">
        <div class="exp-left">
          <div class="exp-name">${e.desc}</div>
          <div class="exp-cat">${e.cat}</div>
        </div>
        <span class="exp-amt">Rs. ${e.amt.toFixed(2)}</span>
        <button class="btn-del" onclick="deleteExpense(${e.id})">X</button>
      </li>`).join('');
  }

  async function getInsights() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const errorBox = document.getElementById('errorBox');
    errorBox.style.display = 'none';
    if (!apiKey) { showError('Please enter your Claude API key.'); return; }
    if (expenses.length === 0) { showError('Please add some expenses first.'); return; }

    const btn = document.getElementById('aiBtn');
    btn.disabled = true; btn.textContent = 'Analyzing...';
    const resultBox = document.getElementById('resultBox');
    const loader = document.getElementById('loader');
    const resultContent = document.getElementById('resultContent');
    resultBox.classList.add('visible');
    loader.style.display = 'flex';
    resultContent.style.display = 'none';

    const summary = expenses.map(e => e.desc + ' (' + e.cat + '): Rs.' + e.amt).join('\n');
    const total = expenses.reduce((s, e) => s + e.amt, 0);

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: 'Analyze these expenses and give friendly, practical insights:\n\n' + summary + '\n\nTotal: Rs.' + total.toFixed(2) + '\n\nGive: 1) Spending breakdown by category 2) Top spending area 3) 2-3 saving tips 4) Overall assessment. Keep it concise and friendly.'
          }]
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'API error');
      loader.style.display = 'none';
      resultContent.style.display = 'block';
      resultContent.textContent = data.content[0].text;
    } catch(err) {
      loader.style.display = 'none';
      resultBox.classList.remove('visible');
      showError('Error: ' + err.message);
    }
    btn.disabled = false;
    btn.textContent = 'Analyze My Spending';
  }

  function showError(msg) {
    const e = document.getElementById('errorBox');
    e.textContent = msg; e.style.display = 'block';
  }
</script>
</body>
</html>
